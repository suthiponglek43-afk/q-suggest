<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Wallet App</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up.active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Configuration ---
        const THAI_BANKS = [
            { id: 'kbank', name: 'ธนาคารกสิกรไทย', shortName: 'KBank', color: 'bg-emerald-600' },
            { id: 'scb', name: 'ธนาคารไทยพาณิชย์', shortName: 'SCB', color: 'bg-purple-700' },
            { id: 'bbl', name: 'ธนาคารกรุงเทพ', shortName: 'BBL', color: 'bg-blue-800' },
            { id: 'ktb', name: 'ธนาคารกรุงไทย', shortName: 'KTB', color: 'bg-sky-500' },
            { id: 'bay', name: 'ธนาคารกรุงศรีอยุธยา', shortName: 'BAY', color: 'bg-yellow-500' },
            { id: 'ttb', name: 'ธนาคารทหารไทยธนชาต', shortName: 'TTB', color: 'bg-blue-600' }
        ];

        // --- Main App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [showBalance, setShowBalance] = useState(true);
            const [successMsg, setSuccessMsg] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [showAddAccountModal, setShowAddAccountModal] = useState(false);
            const [txType, setTxType] = useState('expense');
            const [suggestion, setSuggestion] = useState('');

            // --- Persistence States ---
            const [banks, setBanks] = useState(() => JSON.parse(localStorage.getItem('f_banks')) || [
                { id: 'kbank', name: 'ธนาคารกสิกรไทย', shortName: 'KBank', color: 'bg-emerald-600', accounts: [{ id: 101, name: 'บัญชีเงินเดือน', type: 'ออมทรัพย์', balance: 45000 }] }
            ]);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('f_tx')) || []);
            const [investments] = useState([{ id: 1, name: 'หุ้นไทย (SET)', value: 450000, change: '+2.4%' }]);
            const [budgets] = useState([{ id: 1, category: 'อาหาร', limit: 10000, spent: 6500, color: 'bg-blue-500' }]);

            // --- Form States ---
            const [formData, setFormData] = useState({ amount: '', title: '', category: 'อาหาร', accountId: '' });
            const [newAcc, setNewAcc] = useState({ bankId: 'kbank', name: '', balance: '' });

            // --- Effects ---
            useEffect(() => {
                localStorage.setItem('f_banks', JSON.stringify(banks));
                localStorage.setItem('f_tx', JSON.stringify(transactions));
                lucide.createIcons();
            }, [banks, transactions]);

            useEffect(() => { lucide.createIcons(); }, [activeTab, showModal, showAddAccountModal]);

            // --- Calculations ---
            const totals = useMemo(() => {
                const bankSum = banks.reduce((acc, b) => acc + b.accounts.reduce((a, ac) => a + ac.balance, 0), 0);
                const income = transactions.filter(t => t.type === 'income').reduce((a, t) => a + t.amount, 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((a, t) => a + Math.abs(t.amount), 0);
                return { netWorth: bankSum + 450000, income, expense };
            }, [banks, transactions]);

            const allAccounts = banks.flatMap(b => b.accounts.map(a => ({ ...a, bankName: b.shortName })));

            // --- Handlers ---
            const showToast = (msg) => {
                setSuccessMsg(msg);
                setTimeout(() => setSuccessMsg(''), 3000);
            };

            const handleSaveTx = () => {
                const amt = parseFloat(formData.amount);
                if (!amt || !formData.accountId) return alert("กรุณากรอกข้อมูลให้ครบ");
                
                let updatedBanks = JSON.parse(JSON.stringify(banks));
                let accName = "";
                updatedBanks = updatedBanks.map(b => ({
                    ...b, accounts: b.accounts.map(a => {
                        if (a.id === parseInt(formData.accountId)) {
                            accName = `${b.shortName} - ${a.name}`;
                            return { ...a, balance: txType === 'expense' ? a.balance - amt : a.balance + amt };
                        }
                        return a;
                    })
                }));

                setBanks(updatedBanks);
                setTransactions([{ id: Date.now(), title: formData.title || 'รายการใหม่', amount: txType === 'expense' ? -amt : amt, type: txType, accountName: accName, date: new Date().toLocaleString('th-TH'), category: formData.category }, ...transactions]);
                setShowModal(false);
                setFormData({ amount: '', title: '', category: 'อาหาร', accountId: '' });
                showToast("บันทึกสำเร็จ!");
            };

            const handleAddAccount = () => {
                if (!newAcc.name || !newAcc.balance) return;
                const bankBase = THAI_BANKS.find(b => b.id === newAcc.bankId);
                let updated = [...banks];
                const idx = updated.findIndex(b => b.id === newAcc.bankId);
                const accObj = { id: Date.now(), name: newAcc.name, type: 'ออมทรัพย์', balance: parseFloat(newAcc.balance) };
                
                if (idx >= 0) updated[idx].accounts.push(accObj);
                else updated.push({ ...bankBase, accounts: [accObj] });

                setBanks(updated);
                setShowAddAccountModal(false);
                showToast("เพิ่มบัญชีสำเร็จ");
            };

            return (
                <div className="min-h-screen flex justify-center">
                    {successMsg && <div className="fixed top-10 z-[70] bg-emerald-500 text-white px-6 py-3 rounded-full font-bold shadow-xl animate-in">{successMsg}</div>}

                    <div className="w-full max-w-md bg-white sm:rounded-[40px] shadow-2xl relative flex flex-col overflow-hidden border-white">
                        
                        {/* Header Panel */}
                        <div className="pt-12 pb-8 px-6 bg-white shrink-0 rounded-b-[40px] shadow-sm z-10">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-2xl bg-black text-white flex items-center justify-center font-bold">A</div>
                                    <div><p className="text-[10px] text-slate-400 font-bold uppercase">Net Worth</p><p className="font-bold">คุณอภิสิทธิ์</p></div>
                                </div>
                                <button onClick={() => setShowBalance(!showBalance)} className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
                                    <i data-lucide={showBalance ? "eye" : "eye-off"} style={{width:18}}></i>
                                </button>
                            </div>
                            <div className="text-center">
                                <h2 className="text-4xl font-black text-slate-900 tracking-tighter">
                                    {showBalance ? `฿${totals.netWorth.toLocaleString()}` : '••••••••••'}
                                </h2>
                                <div className="flex justify-center gap-3 mt-8">
                                    <button onClick={() => {setTxType('expense'); setShowModal(true);}} className="flex-1 bg-black text-white py-4 rounded-2xl text-xs font-bold shadow-lg active:scale-95 transition-all">บันทึกรายการ</button>
                                    <button className="px-6 border border-slate-200 py-4 rounded-2xl text-xs font-bold active:scale-95 transition-all"><i data-lucide="arrow-right-left" style={{width:16}}></i></button>
                                </div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 px-6 pt-6 pb-28 overflow-y-auto no-scrollbar scroll-smooth">
                            {activeTab === 'home' && (
                                <div className="space-y-8 animate-in">
                                    <div className="grid grid-cols-2 gap-4 text-center">
                                        <div className="bg-emerald-50 p-4 rounded-3xl border border-emerald-100"><p className="text-[10px] font-bold text-emerald-700 uppercase">รายรับ</p><p className="text-lg font-bold">฿{totals.income.toLocaleString()}</p></div>
                                        <div className="bg-rose-50 p-4 rounded-3xl border border-rose-100"><p className="text-[10px] font-bold text-rose-700 uppercase">รายจ่าย</p><p className="text-lg font-bold">฿{totals.expense.toLocaleString()}</p></div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center font-bold"><span>บัญชีธนาคาร</span><button onClick={()=>setShowAddAccountModal(true)} className="text-blue-600 text-xs">+ เพิ่มบัญชี</button></div>
                                        {banks.map(b => (
                                            <div key={b.id} className="bg-white p-4 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 ${b.color} rounded-xl text-white text-[10px] font-bold flex items-center justify-center`}>{b.shortName}</div>
                                                    <div><p className="font-bold text-sm">{b.name}</p><p className="text-[10px] text-slate-400">{b.accounts.length} บัญชี</p></div>
                                                </div>
                                                <p className="font-bold text-sm">฿{b.accounts.reduce((a,ac)=>a+ac.balance,0).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-in">
                                    <h3 className="font-bold text-xl mb-4">ประวัติรายการ</h3>
                                    {transactions.map(t => (
                                        <div key={t.id} className="bg-white p-4 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}><i data-lucide={t.type === 'income' ? "arrow-down-left" : "arrow-up-right"} style={{width:20}}></i></div>
                                                <div><p className="font-bold text-sm text-slate-800">{t.title}</p><p className="text-[10px] text-slate-400">{t.accountName}</p></div>
                                            </div>
                                            <div className="text-right font-bold"><p className={t.amount > 0 ? 'text-emerald-600' : 'text-slate-800'}>{t.amount > 0 ? '+' : ''}฿{Math.abs(t.amount).toLocaleString()}</p></div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Nav Bar */}
                        <div className="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center pb-8 z-20">
                            {['home', 'history', 'stats', 'settings'].map(t => (
                                <button key={t} onClick={()=>setActiveTab(t)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t ? 'text-blue-600 -translate-y-1' : 'text-slate-400'}`}>
                                    <i data-lucide={t === 'home' ? 'wallet' : t === 'stats' ? 'pie-chart' : t === 'history' ? 'history' : 'settings'} style={{width:24}}></i>
                                    <span className="text-[9px] font-bold uppercase">{t}</span>
                                </button>
                            ))}
                        </div>

                        {/* Add Tx Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${showModal ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${showModal ? 'active' : ''}`}>
                                <div className="flex justify-between mb-8 font-black text-xl"><h4>บันทึกรายการ</h4><button onClick={()=>setShowModal(false)}><i data-lucide="x"></i></button></div>
                                <div className="space-y-6">
                                    <input type="number" placeholder="0.00" className={`w-full text-5xl font-black text-center outline-none ${txType === 'expense' ? 'text-rose-500' : 'text-emerald-500'}`} value={formData.amount} onChange={e=>setFormData({...formData, amount: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={formData.accountId} onChange={e=>setFormData({...formData, accountId: e.target.value})}>
                                        <option value="">เลือกบัญชี</option>
                                        {allAccounts.map(a => <option key={a.id} value={a.id}>{a.bankName} - {a.name}</option>)}
                                    </select>
                                    <input type="text" placeholder="บันทึกช่วยจำ" className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={formData.title} onChange={e=>setFormData({...formData, title: e.target.value})} />
                                    <button onClick={handleSaveTx} className={`w-full py-5 rounded-3xl text-white font-black text-lg ${txType === 'expense' ? 'bg-rose-500' : 'bg-emerald-500'}`}>ยืนยันบันทึก</button>
                                </div>
                            </div>
                        </div>

                        {/* Add Acc Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${showAddAccountModal ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${showAddAccountModal ? 'active' : ''}`}>
                                <div className="flex justify-between mb-6 font-black text-xl"><h4>เพิ่มบัญชีใหม่</h4><button onClick={()=>setShowAddAccountModal(false)}><i data-lucide="x"></i></button></div>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={newAcc.bankId} onChange={e=>setNewAcc({...newAcc, bankId: e.target.value})}>
                                        {THAI_BANKS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                                    </select>
                                    <input type="text" placeholder="ชื่อบัญชี" className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={newAcc.name} onChange={e=>setNewAcc({...newAcc, name: e.target.value})} />
                                    <input type="number" placeholder="ยอดเงินเริ่มต้น" className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={newAcc.balance} onChange={e=>setNewAcc({...newAcc, balance: e.target.value})} />
                                    <button onClick={handleAddAccount} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-lg">เพิ่มบัญชีใหม่</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
