<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finance Pro | Investment Edition</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up.active { transform: translateY(0); }
        .investment-gradient { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Lucide = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name.toLowerCase()} className={className} style={{width: size, height: size, display:'inline-block'}}></i>;
        };

        const THAI_BANKS = [
            { id: 'kbank', name: 'กสิกรไทย', shortName: 'KBank', color: 'bg-emerald-600' },
            { id: 'scb', name: 'ไทยพาณิชย์', shortName: 'SCB', color: 'bg-purple-700' },
            { id: 'bbl', name: 'กรุงเทพ', shortName: 'BBL', color: 'bg-blue-800' },
            { id: 'ktb', name: 'กรุงไทย', shortName: 'KTB', color: 'bg-sky-500' },
            { id: 'bay', name: 'กรุงศรีฯ', shortName: 'BAY', color: 'bg-yellow-500' },
            { id: 'ttb', name: 'ทหารไทยธนชาต', shortName: 'TTB', color: 'bg-blue-600' },
            { id: 'gsb', name: 'ออมสิน', shortName: 'GSB', color: 'bg-pink-500' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [showBalance, setShowBalance] = useState(true);
            const [modals, setModals] = useState({ tx: false, acc: false, inv: false });
            const [txType, setTxType] = useState('expense');

            // --- Database (Starts at 0) ---
            const [cash, setCash] = useState(() => Number(localStorage.getItem('v5_cash')) || 0);
            const [banks, setBanks] = useState(() => JSON.parse(localStorage.getItem('v5_banks')) || []);
            const [investments, setInvestments] = useState(() => JSON.parse(localStorage.getItem('v5_inv')) || []);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('v5_tx')) || []);

            // --- Form States ---
            const [txForm, setTxForm] = useState({ amount: '', title: '', sourceId: 'cash', category: 'ทั่วไป' });
            const [accForm, setAccForm] = useState({ bankId: 'kbank', name: '', balance: '' });
            const [invForm, setInvForm] = useState({ name: '', type: 'หุ้น', initialValue: '' });

            useEffect(() => {
                localStorage.setItem('v5_cash', cash);
                localStorage.setItem('v5_banks', JSON.stringify(banks));
                localStorage.setItem('v5_inv', JSON.stringify(investments));
                localStorage.setItem('v5_tx', JSON.stringify(transactions));
                lucide.createIcons();
            }, [cash, banks, investments, transactions, activeTab, modals]);

            const totals = useMemo(() => {
                const bankSum = banks.reduce((a, b) => a + b.accounts.reduce((ac, s) => ac + s.balance, 0), 0);
                const invSum = investments.reduce((a, i) => a + Number(i.value), 0);
                return { netWorth: bankSum + cash + invSum, invSum, bankSum };
            }, [banks, cash, investments]);

            const allSources = [{ id: 'cash', name: 'เงินสด', bankName: 'Cash' }, ...banks.flatMap(b => b.accounts.map(a => ({ ...a, bankName: b.shortName })))];

            // --- Handlers ---
            const toggleM = (m, val) => setModals(prev => ({ ...prev, [m]: val }));

            const saveTx = () => {
                const amt = parseFloat(txForm.amount);
                if (!amt) return alert("ระบุจำนวนเงิน");
                
                let accLabel = "";
                if (txForm.sourceId === 'cash') {
                    setCash(prev => txType === 'expense' ? prev - amt : prev + amt);
                    accLabel = "เงินสด";
                } else {
                    const newBanks = banks.map(b => ({
                        ...b, accounts: b.accounts.map(a => {
                            if (a.id === parseInt(txForm.sourceId)) {
                                accLabel = `${b.shortName} - ${a.name}`;
                                return { ...a, balance: txType === 'expense' ? a.balance - amt : a.balance + amt };
                            }
                            return a;
                        })
                    }));
                    setBanks(newBanks);
                }

                setTransactions([{ id: Date.now(), title: txForm.title || (txType==='expense'?'จ่าย':'รับ'), amount: txType==='expense'?-amt:amt, accLabel, date: new Date().toLocaleString('th-TH', {hour:'2-digit', minute:'2-digit'}), type: txType }, ...transactions]);
                toggleM('tx', false);
                setTxForm({ amount: '', title: '', sourceId: 'cash', category: 'ทั่วไป' });
            };

            const addAcc = () => {
                const bankBase = THAI_BANKS.find(b => b.id === accForm.bankId);
                const newAcc = { id: Date.now(), name: accForm.name, balance: parseFloat(accForm.balance || 0) };
                const idx = banks.findIndex(b => b.id === accForm.bankId);
                if (idx >= 0) {
                    const updated = [...banks]; updated[idx].accounts.push(newAcc); setBanks(updated);
                } else {
                    setBanks([...banks, { ...bankBase, accounts: [newAcc] }]);
                }
                toggleM('acc', false);
            };

            const addInv = () => {
                if (!invForm.name || !invForm.initialValue) return alert("กรุณากรอกข้อมูล");
                const newInv = { id: Date.now(), name: invForm.name, type: invForm.type, value: parseFloat(invForm.initialValue) };
                setInvestments([...investments, newInv]);
                toggleM('inv', false);
                setInvForm({ name: '', type: 'หุ้น', initialValue: '' });
            };

            return (
                <div className="min-h-screen flex justify-center">
                    <div className="w-full max-w-md bg-white sm:rounded-[40px] shadow-2xl relative flex flex-col h-screen overflow-hidden">
                        
                        {/* 1. Header (Common for all tabs) */}
                        <div className="pt-12 pb-8 px-6 bg-white shrink-0 rounded-b-[40px] shadow-sm z-10 text-center">
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">สินทรัพย์สุทธิ (Net Worth)</p>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter mt-1">
                                {showBalance ? `฿${totals.netWorth.toLocaleString()}` : '••••••••••'}
                            </h2>
                            <div className="flex justify-center gap-3 mt-8">
                                <button onClick={() => {setTxType('expense'); toggleM('tx', true);}} className="flex-1 bg-black text-white py-4 rounded-2xl text-xs font-bold shadow-lg active:scale-95 transition-all">บันทึกรายการ</button>
                                <button onClick={() => setShowBalance(!showBalance)} className="px-6 border border-slate-200 py-4 rounded-2xl text-slate-400 active:scale-95 transition-all">
                                    <Lucide name={showBalance ? "Eye" : "EyeOff"} size={18} />
                                </button>
                            </div>
                        </div>

                        {/* 2. Content Area */}
                        <div className="flex-1 px-6 pt-6 pb-28 overflow-y-auto no-scrollbar scroll-smooth bg-slate-50/30">
                            
                            {/* TAB: HOME (Wallet) */}
                            {activeTab === 'home' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-gradient-to-br from-orange-400 to-rose-500 rounded-[32px] p-6 text-white shadow-xl shadow-orange-100 flex justify-between items-center">
                                        <div><p className="text-[10px] font-bold opacity-80 uppercase">เงินสด</p><h3 className="text-3xl font-black">฿{cash.toLocaleString()}</h3></div>
                                        <div className="p-3 bg-white/20 rounded-2xl backdrop-blur-md"><Lucide name="Banknote" size={28}/></div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><h3 className="font-bold text-slate-800">บัญชีธนาคาร</h3><button onClick={()=>toggleM('acc', true)} className="text-blue-600 text-xs font-bold">+ เพิ่มธนาคาร</button></div>
                                        {banks.length === 0 && <p className="text-center py-10 text-xs text-slate-300 border-2 border-dashed border-slate-100 rounded-[32px]">ยังไม่มีบัญชีธนาคาร</p>}
                                        {banks.map(b => (
                                            <div key={b.id} className="bg-white p-4 rounded-[28px] border border-slate-100 shadow-sm flex justify-between items-center">
                                                <div className="flex items-center gap-3"><div className={`w-10 h-10 ${b.color} rounded-xl text-white text-[10px] font-bold flex items-center justify-center`}>{b.shortName}</div><div><p className="font-bold text-sm">{b.name}</p><p className="text-[10px] text-slate-400">{b.accounts.length} บัญชี</p></div></div>
                                                <p className="font-bold text-slate-800">฿{b.accounts.reduce((a,ac)=>a+ac.balance,0).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: INVESTMENT (New Page) */}
                            {activeTab === 'invest' && (
                                <div className="space-y-6 animate-in">
                                    <div className="flex justify-between items-center"><h3 className="font-bold text-xl text-slate-800">การลงทุน</h3><button onClick={()=>toggleM('inv', true)} className="bg-indigo-600 text-white p-2 rounded-full shadow-lg shadow-indigo-100"><Lucide name="Plus" size={20}/></button></div>
                                    
                                    <div className="investment-gradient rounded-[35px] p-8 text-white shadow-2xl relative overflow-hidden">
                                        <p className="text-indigo-200 text-xs font-bold uppercase tracking-widest">พอร์ตลงทุนรวมทั้งหมด</p>
                                        <h4 className="text-4xl font-black mt-2">฿{totals.invSum.toLocaleString()}</h4>
                                        <div className="absolute top-0 right-0 p-8 opacity-10"><Lucide name="TrendingUp" size={80}/></div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4 mt-2">
                                        <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest px-1">พอร์ตย่อยของคุณ</h4>
                                        {investments.length === 0 && <p className="text-center py-10 text-xs text-slate-300 italic">กดปุ่ม + เพื่อสร้างพอร์ตแรก</p>}
                                        {investments.map(inv => (
                                            <div key={inv.id} className="bg-white p-5 rounded-[30px] border border-slate-100 shadow-sm flex justify-between items-center group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                                                        <Lucide name={inv.type === 'หุ้น' ? 'BarChart3' : inv.type === 'คริปโต' ? 'Zap' : 'Coins'} size={24}/>
                                                    </div>
                                                    <div><p className="font-bold text-slate-800">{inv.name}</p><p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">{inv.type}</p></div>
                                                </div>
                                                <div className="text-right"><p className="font-black text-slate-800">฿{inv.value.toLocaleString()}</p><p className="text-[9px] text-emerald-500 font-bold">+0.00%</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-in">
                                    <h3 className="font-bold text-xl text-slate-800">ประวัติรายการ</h3>
                                    {transactions.map(t => (
                                        <div key={t.id} className="bg-white p-4 rounded-3xl border border-slate-50 shadow-sm flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl ${t.amount > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}><Lucide name={t.amount > 0 ? "ArrowDownLeft" : "ArrowUpRight"} size={20}/></div>
                                                <div><p className="font-bold text-sm text-slate-800">{t.title}</p><p className="text-[10px] text-slate-400">{t.accLabel}</p></div>
                                            </div>
                                            <p className={`font-bold text-sm ${t.amount > 0 ? 'text-emerald-600' : 'text-slate-800'}`}>฿{Math.abs(t.amount).toLocaleString()}</p>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && <p className="text-center py-20 italic text-slate-300 text-sm">ไม่มีประวัติ</p>}
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <h3 className="font-bold text-xl text-slate-800">ตั้งค่า</h3>
                                    <button onClick={()=>{localStorage.clear(); location.reload();}} className="w-full py-5 bg-rose-50 text-rose-600 rounded-[32px] font-bold text-sm flex justify-center items-center gap-2 border border-rose-100"><Lucide name="Trash2" size={18}/> ล้างข้อมูลทั้งหมดเพื่อเริ่มใหม่</button>
                                </div>
                            )}

                        </div>

                        {/* 3. Navigation Bar */}
                        <div className="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center pb-8 z-20">
                            {[
                                {id: 'home', icon: 'Wallet', label: 'Wallet'},
                                {id: 'invest', icon: 'TrendingUp', label: 'Invest'},
                                {id: 'history', icon: 'History', label: 'History'},
                                {id: 'settings', icon: 'Settings', label: 'Menu'}
                            ].map(t => (
                                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'text-blue-600 -translate-y-1' : 'text-slate-300'}`}>
                                    <Lucide name={t.icon} size={24} />
                                    <span className="text-[9px] font-black uppercase tracking-wider">{t.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* 4. MODALS */}
                        {/* Transaction Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.tx ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.tx ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">บันทึกรายการ</h4><button onClick={()=>toggleM('tx', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-8"><button onClick={()=>setTxType('expense')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${txType==='expense'?'bg-white shadow-sm text-rose-600':'text-slate-400'}`}>รายจ่าย</button><button onClick={()=>setTxType('income')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${txType==='income'?'bg-white shadow-sm text-emerald-600':'text-slate-400'}`}>รายรับ</button></div>
                                <div className="space-y-6">
                                    <input type="number" placeholder="0.00" className={`w-full text-5xl font-black text-center outline-none ${txType==='expense'?'text-rose-500':'text-emerald-500'}`} value={txForm.amount} onChange={e=>setTxForm({...txForm, amount: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={txForm.sourceId} onChange={e=>setTxForm({...txForm, sourceId: e.target.value})}>{allSources.map(s => <option key={s.id} value={s.id}>{s.bankName} - {s.name || 'ยอดรวม'}</option>)}</select>
                                    <input type="text" placeholder="ระบุรายการ..." className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={txForm.title} onChange={e=>setTxForm({...txForm, title: e.target.value})} />
                                    <button onClick={saveTx} className={`w-full py-5 rounded-[32px] text-white font-black text-lg ${txType==='expense'?'bg-rose-50 shadow-rose-100':'bg-emerald-500 shadow-emerald-100'} shadow-xl ${txType==='expense'?'!bg-rose-500':'!bg-emerald-500'}`}>ยืนยัน</button>
                                </div>
                            </div>
                        </div>

                        {/* Account Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.acc ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.acc ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">เพิ่มบัญชีธนาคาร</h4><button onClick={()=>toggleM('acc', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-100 rounded-2xl font-bold" value={accForm.bankId} onChange={e=>setAccForm({...accForm, bankId: e.target.value})}>{THAI_BANKS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</select>
                                    <input type="text" placeholder="ชื่อบัญชี" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={accForm.name} onChange={e=>setAccForm({...accForm, name: e.target.value})} />
                                    <input type="number" placeholder="ยอดเงินเริ่มต้น" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xl" value={accForm.balance} onChange={e=>setAccForm({...accForm, balance: e.target.value})} />
                                    <button onClick={addAcc} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-lg shadow-lg">เพิ่มบัญชี</button>
                                </div>
                            </div>
                        </div>

                        {/* Investment Portfolio Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.inv ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.inv ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">สร้างพอร์ตลงทุนใหม่</h4><button onClick={()=>toggleM('inv', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="ชื่อพอร์ต (เช่น พอร์ตหุ้นไทย, เหรียญคริปโต)" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={invForm.name} onChange={e=>setInvForm({...invForm, name: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={invForm.type} onChange={e=>setInvForm({...invForm, type: e.target.value})}>
                                        <option value="หุ้น">หุ้น (Stock)</option>
                                        <option value="คริปโต">คริปโต (Crypto)</option>
                                        <option value="ทองคำ">ทองคำ / สินทรัพย์อื่นๆ</option>
                                    </select>
                                    <input type="number" placeholder="มูลค่าเริ่มต้น" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xl" value={invForm.initialValue} onChange={e=>setInvForm({...invForm, initialValue: e.target.value})} />
                                    <button onClick={addInv} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-lg">บันทึกพอร์ต</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
