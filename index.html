<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Finance | Modern UI & Budget Edition</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #E2E8F0; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .slide-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .slide-up.active { transform: translateY(0); }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        .premium-shadow {
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ระบบกู้คืนยอดเงินและข้อมูลทั้งหมดจาก V1 แบบบังคับ (Force Migration V4)
        // จะไปดึงยอดเงินและประวัติเดิมมาทับเลข 0 ที่แอปเผลอสร้างไว้
        // ==========================================
        const DB_KEY = "f_data_v2";
        const OLD_DB_KEY = "f_data_stable_v1";

        if (!localStorage.getItem(DB_KEY + '_migrated_v4')) {
            
            // 1. ดึงยอดเงินสดมาทับ
            const oldCash = localStorage.getItem(OLD_DB_KEY + '_cash');
            if (oldCash !== null) localStorage.setItem(DB_KEY + '_cash', oldCash);
            
            // 2. ดึงบัญชีธนาคารมาทับ
            const oldBanks = localStorage.getItem(OLD_DB_KEY + '_banks');
            if (oldBanks && oldBanks !== "[]") localStorage.setItem(DB_KEY + '_banks', oldBanks);
            
            // 3. ดึงพอร์ตลงทุนมาทับ
            const oldInv = localStorage.getItem(OLD_DB_KEY + '_inv');
            if (oldInv && oldInv !== "[]") localStorage.setItem(DB_KEY + '_inv', oldInv);
            
            // 4. ดึงประวัติรายการทั้งหมดมาทับ (แปลงเป็นแบบมีหมวดหมู่)
            const oldTx = JSON.parse(localStorage.getItem(OLD_DB_KEY + '_tx') || '[]');
            if (oldTx.length > 0) {
                const mappedOld = oldTx.map(t => ({
                    ...t,
                    category: t.type === 'expense' 
                        ? { id: 'other_exp', name: 'อื่นๆ (ข้อมูลเก่า)', icon: 'more-horizontal', color: 'bg-slate-500' }
                        : { id: 'other_inc', name: 'รับอื่นๆ (ข้อมูลเก่า)', icon: 'plus-circle', color: 'bg-slate-500' }
                }));
                localStorage.setItem(DB_KEY + '_tx', JSON.stringify(mappedOld));
            }
            
            // 5. ลบข้อมูลงบประมาณที่อาจจะค้างอยู่
            localStorage.setItem(DB_KEY + '_cat_budgets', '{}');
            
            // ติดป้ายกำกับว่าดึงข้อมูลสำเร็จแล้ว
            localStorage.setItem(DB_KEY + '_migrated_v4', 'true');
        }

        const { useState, useMemo, useEffect } = React;

        // แก้บั๊กหน้าจอขาวเวลากดซ่อนเงิน (แยกการอัปเดต React กับ Lucide ออกจากกัน)
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, size, className]);
            
            return <span ref={spanRef} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}></span>;
        };

        const THAI_BANKS = [
            { id: 'kbank', name: 'กสิกรไทย', shortName: 'KBANK', color: 'bg-[#00A950]', hasTravel: true },
            { id: 'scb', name: 'ไทยพาณิชย์', shortName: 'SCB', color: 'bg-[#4E2A84]', hasTravel: true },
            { id: 'bbl', name: 'กรุงเทพ', shortName: 'BBL', color: 'bg-[#1E4598]', hasTravel: false },
            { id: 'ktb', name: 'กรุงไทย', shortName: 'KTB', color: 'bg-[#00aeeF]', hasTravel: true },
            { id: 'ttb', name: 'ทีทีบี', shortName: 'ttb', color: 'bg-[#0050f0]', hasTravel: true },
            { id: 'bay', name: 'กรุงศรีฯ', shortName: 'BAY', color: 'bg-[#FEC400]', textColor: 'text-gray-800', hasTravel: true },
            { id: 'gsb', name: 'ออมสิน', shortName: 'GSB', color: 'bg-[#EB008B]', hasTravel: false },
            { id: 'uob', name: 'ยูโอบี', shortName: 'UOB', color: 'bg-[#003B70]', hasTravel: false }
        ];

        // หมวดหมู่
        const CATEGORIES = {
            expense: [
                { id: 'food', name: 'อาหาร', icon: 'utensils', color: 'bg-orange-500' },
                { id: 'transport', name: 'เดินทาง', icon: 'car', color: 'bg-blue-500' },
                { id: 'shopping', name: 'ช้อปปิ้ง', icon: 'shopping-bag', color: 'bg-pink-500' },
                { id: 'bills', name: 'บิล/ค่าใช้จ่าย', icon: 'receipt', color: 'bg-purple-500' },
                { id: 'entertainment', name: 'บันเทิง', icon: 'film', color: 'bg-indigo-500' },
                { id: 'other_exp', name: 'อื่นๆ', icon: 'more-horizontal', color: 'bg-slate-500' }
            ],
            income: [
                { id: 'salary', name: 'เงินเดือน', icon: 'wallet', color: 'bg-emerald-500' },
                { id: 'investment', name: 'ผลตอบแทน', icon: 'trending-up', color: 'bg-teal-500' },
                { id: 'other_inc', name: 'รับอื่นๆ', icon: 'plus-circle', color: 'bg-slate-500' }
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [showBalance, setShowBalance] = useState(true);
            const [modals, setModals] = useState({ tx: false, acc: false, inv: false, budget: false });
            const [txType, setTxType] = useState('expense');
            
            // ดึงข้อมูล LocalStorage
            const [cash, setCash] = useState(() => Number(localStorage.getItem(DB_KEY + '_cash')) || 0);
            const [banks, setBanks] = useState(() => JSON.parse(localStorage.getItem(DB_KEY + '_banks')) || []);
            const [investments, setInvestments] = useState(() => JSON.parse(localStorage.getItem(DB_KEY + '_inv')) || []);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem(DB_KEY + '_tx')) || []);
            const [categoryBudgets, setCategoryBudgets] = useState(() => JSON.parse(localStorage.getItem(DB_KEY + '_cat_budgets')) || {});

            // Forms
            const [txForm, setTxForm] = useState({ amount: '', title: '', sourceId: 'cash', categoryId: 'food' });
            const [accForm, setAccForm] = useState({ bankId: 'kbank', name: '', balance: '', type: 'ออมทรัพย์' });
            const [invForm, setInvForm] = useState({ name: '', type: 'หุ้น', val: '' });
            const [budgetForm, setBudgetForm] = useState({});

            useEffect(() => {
                localStorage.setItem(DB_KEY + '_cash', cash);
                localStorage.setItem(DB_KEY + '_banks', JSON.stringify(banks));
                localStorage.setItem(DB_KEY + '_inv', JSON.stringify(investments));
                localStorage.setItem(DB_KEY + '_tx', JSON.stringify(transactions));
                localStorage.setItem(DB_KEY + '_cat_budgets', JSON.stringify(categoryBudgets));
            }, [cash, banks, investments, transactions, categoryBudgets]);

            const totals = useMemo(() => {
                const bankSum = banks.reduce((a, b) => a + b.accounts.reduce((ac, s) => ac + s.balance, 0), 0);
                const invSum = investments.reduce((a, i) => a + Number(i.val), 0);
                const periodExpense = transactions.filter(t => t.type === 'expense').reduce((a, t) => a + Math.abs(t.amount), 0);
                const periodIncome = transactions.filter(t => t.type === 'income').reduce((a, t) => a + Math.abs(t.amount), 0);
                return { netWorth: bankSum + cash + invSum, invSum, periodExpense, periodIncome };
            }, [banks, cash, investments, transactions]);

            const allSources = [{ id: 'cash', name: 'กระเป๋าเงินสด', bankName: 'Cash' }, ...banks.flatMap(b => b.accounts.map(a => ({ ...a, bankName: b.shortName })))];

            // บันทึกรายการ
            const saveTx = () => {
                const amt = parseFloat(txForm.amount);
                if (!amt) return alert("กรุณาระบุจำนวนเงิน");
                
                let label = "";
                let sourceValid = false;

                if (txForm.sourceId === 'cash') {
                    setCash(prev => txType === 'expense' ? prev - amt : prev + amt);
                    label = "เงินสด";
                    sourceValid = true;
                } else {
                    const newBanks = banks.map(b => {
                        let updatedAccounts = b.accounts.map(a => {
                            if (a.id === parseInt(txForm.sourceId)) {
                                label = `${b.shortName} - ${a.name}`;
                                sourceValid = true;
                                return { ...a, balance: txType === 'expense' ? a.balance - amt : a.balance + amt };
                            }
                            return a;
                        });
                        return { ...b, accounts: updatedAccounts };
                    });
                    setBanks(newBanks);
                }

                if(!sourceValid) return alert("ไม่พบบัญชีต้นทาง");

                const catInfo = CATEGORIES[txType].find(c => c.id === txForm.categoryId) || CATEGORIES[txType][0];
                const newTx = {
                    id: Date.now(),
                    title: txForm.title || catInfo.name,
                    amount: txType === 'expense' ? -amt : amt,
                    sourceId: txForm.sourceId,
                    label: label,
                    category: catInfo,
                    date: new Date().toLocaleString('th-TH', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
                    type: txType,
                    timestamp: Date.now()
                };
                
                setTransactions([newTx, ...transactions]);
                setModals({...modals, tx: false});
                setTxForm({ amount: '', title: '', sourceId: 'cash', categoryId: txType === 'expense' ? 'food' : 'salary' });
            };

            // ลบรายการ
            const deleteTx = (txId) => {
                if(!confirm('ต้องการลบรายการนี้ และคืนยอดเงินกลับใช่หรือไม่?')) return;
                
                const txToDelete = transactions.find(t => t.id === txId);
                if(!txToDelete) return;

                const reverseAmt = Math.abs(txToDelete.amount);
                const isExpense = txToDelete.type === 'expense';

                if (txToDelete.sourceId === 'cash') {
                    setCash(prev => isExpense ? prev + reverseAmt : prev - reverseAmt);
                } else {
                    setBanks(banks.map(b => ({
                        ...b, accounts: b.accounts.map(a => {
                            if (a.id === parseInt(txToDelete.sourceId)) {
                                return { ...a, balance: isExpense ? a.balance + reverseAmt : a.balance - reverseAmt };
                            }
                            return a;
                        })
                    })));
                }

                setTransactions(transactions.filter(t => t.id !== txId));
            };

            const addAcc = () => {
                if(!accForm.name || !accForm.balance) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                const base = THAI_BANKS.find(b => b.id === accForm.bankId);
                const newAcc = { id: Date.now(), name: accForm.name, balance: parseFloat(accForm.balance), type: accForm.type };
                const idx = banks.findIndex(b => b.id === accForm.bankId);
                if (idx >= 0) {
                    const updated = [...banks]; updated[idx].accounts.push(newAcc); setBanks(updated);
                } else {
                    setBanks([...banks, { ...base, accounts: [newAcc] }]);
                }
                setModals({...modals, acc: false});
                setAccForm({ bankId: 'kbank', name: '', balance: '', type: 'ออมทรัพย์' });
            };

            // ข้อมูลสำหรับสถิติ (เฉพาะรายจ่าย)
            const statsData = useMemo(() => {
                const expenses = transactions.filter(t => t.type === 'expense');
                const byCat = expenses.reduce((acc, tx) => {
                    acc[tx.category.id] = (acc[tx.category.id] || 0) + Math.abs(tx.amount);
                    return acc;
                }, {});
                
                return CATEGORIES.expense.map(cat => {
                    const amount = byCat[cat.id] || 0;
                    const catBudget = categoryBudgets[cat.id] || 0;
                    return { 
                        ...cat, 
                        amount, 
                        budget: catBudget,
                        percent: catBudget > 0 ? (amount / catBudget) * 100 : (totals.periodExpense > 0 ? (amount / totals.periodExpense) * 100 : 0) 
                    };
                }).filter(c => c.amount > 0 || c.budget > 0)
                  .sort((a, b) => b.amount - a.amount);
            }, [transactions, totals.periodExpense, categoryBudgets]);

            const totalBudget = useMemo(() => Object.values(categoryBudgets).reduce((a, b) => a + Number(b), 0), [categoryBudgets]);

            return (
                <div className="min-h-screen flex justify-center sm:py-6">
                    <div className="w-full max-w-md bg-[#F8FAFC] sm:rounded-[40px] shadow-2xl relative flex flex-col h-screen sm:h-[90vh] overflow-hidden">
                        
                        {/* Header Section */}
                        <div className="pt-12 pb-8 px-6 bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 text-white shrink-0 z-10 rounded-b-[32px] premium-shadow">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <p className="text-xs text-slate-400 font-medium tracking-wide">รวมสินทรัพย์สุทธิ</p>
                                    <h2 className="text-3xl font-bold tracking-tight mt-1 flex items-center gap-3">
                                        {showBalance ? `฿${totals.netWorth.toLocaleString()}` : '฿ *,***.**'}
                                        <button onClick={() => setShowBalance(!showBalance)} className="text-slate-400 hover:text-white transition-colors">
                                            <Icon name={showBalance ? "eye" : "eye-off"} size={20} />
                                        </button>
                                    </h2>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm border border-white/20">
                                    <Icon name="bell" size={18} className="text-white"/>
                                </div>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => {setTxType('expense'); setTxForm({...txForm, categoryId:'food'}); setModals({...modals, tx:true});}} 
                                        className="flex-1 bg-rose-500/20 text-rose-100 hover:bg-rose-500 hover:text-white py-3 rounded-2xl text-sm font-semibold transition-all border border-rose-500/30 flex items-center justify-center gap-2">
                                    <Icon name="arrow-down-right" size={18}/> จ่าย
                                </button>
                                <button onClick={() => {setTxType('income'); setTxForm({...txForm, categoryId:'salary'}); setModals({...modals, tx:true});}} 
                                        className="flex-1 bg-emerald-500/20 text-emerald-100 hover:bg-emerald-500 hover:text-white py-3 rounded-2xl text-sm font-semibold transition-all border border-emerald-500/30 flex items-center justify-center gap-2">
                                    <Icon name="arrow-up-right" size={18}/> รับ
                                </button>
                            </div>
                        </div>

                        {/* Main Scrollable Content */}
                        <div className="flex-1 px-6 pt-6 pb-28 overflow-y-auto no-scrollbar">
                            
                            {/* TAB: HOME */}
                            {activeTab === 'home' && (
                                <div className="space-y-5 animate-in">
                                    <div className="bg-white rounded-3xl p-5 flex justify-between items-center premium-shadow border border-slate-100">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-orange-100 text-orange-500 rounded-2xl flex items-center justify-center">
                                                <Icon name="wallet" size={24}/>
                                            </div>
                                            <div>
                                                <p className="text-xs font-medium text-slate-400">เงินสด</p>
                                                <h3 className="text-xl font-bold text-slate-800">฿{showBalance ? cash.toLocaleString() : '***'}</h3>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-2">
                                        <div className="flex justify-between items-end mb-3">
                                            <h3 className="font-bold text-slate-800 text-lg">บัญชีของฉัน</h3>
                                            <button onClick={()=>setModals({...modals, acc:true})} className="text-indigo-600 text-sm font-medium flex items-center gap-1">
                                                <Icon name="plus" size={16}/> เพิ่มบัญชี
                                            </button>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {banks.map(b => (
                                                <div key={b.id} className="bg-white rounded-[24px] border border-slate-100 premium-shadow overflow-hidden">
                                                    <div className="p-4">
                                                        <div className="flex items-center gap-3 mb-3">
                                                            <div className={`w-8 h-8 ${b.color} ${b.textColor || 'text-white'} rounded-full text-[9px] font-bold flex items-center justify-center`}>
                                                                {b.shortName}
                                                            </div>
                                                            <p className="font-bold text-sm text-slate-700">{b.name}</p>
                                                        </div>
                                                        <div className="space-y-2">
                                                            {b.accounts.map(acc => (
                                                                <div key={acc.id} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                                                    <div>
                                                                        <p className="text-sm font-semibold text-slate-800">{acc.name}</p>
                                                                        <p className="text-[10px] text-slate-400">{acc.type}</p>
                                                                    </div>
                                                                    <span className="font-bold text-slate-800">฿{showBalance ? acc.balance.toLocaleString() : '***'}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {banks.length === 0 && (
                                                <div className="text-center py-8 bg-slate-100/50 rounded-3xl border border-dashed border-slate-300">
                                                    <p className="text-slate-400 text-sm">ยังไม่มีบัญชีธนาคาร</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: HISTORY */}
                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-in">
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">ประวัติการทำรายการ</h3>
                                    <div className="space-y-3">
                                        {transactions.map((t, index) => {
                                            const showDateHeader = index === 0 || transactions[index-1].date.split(',')[0] !== t.date.split(',')[0];
                                            return (
                                                <React.Fragment key={t.id}>
                                                    {showDateHeader && (
                                                        <p className="text-xs font-semibold text-slate-400 mt-4 mb-2 ml-2">{t.date.split(',')[0]}</p>
                                                    )}
                                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 premium-shadow flex justify-between items-center group">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-sm ${t.category?.color || 'bg-slate-500'}`}>
                                                                <Icon name={t.category?.icon || 'circle'} size={20}/>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800">{t.title}</p>
                                                                <p className="text-[11px] text-slate-400 mt-0.5">{t.label} • {t.date.split(',')[1]}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <p className={`font-bold ${t.type==='income' ? 'text-emerald-500' : 'text-slate-800'}`}>
                                                                {t.type === 'income' ? '+' : '-'}฿{Math.abs(t.amount).toLocaleString()}
                                                            </p>
                                                            <button onClick={() => deleteTx(t.id)} className="w-8 h-8 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <Icon name="trash-2" size={14}/>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </React.Fragment>
                                            );
                                        })}
                                        {transactions.length === 0 && (
                                            <div className="text-center py-20">
                                                <Icon name="file-text" size={48} className="text-slate-200 mx-auto mb-3"/>
                                                <p className="text-slate-400 text-sm">ยังไม่มีรายการ</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* TAB: STATS (ระบบงบประมาณ) */}
                            {activeTab === 'stats' && (
                                <div className="space-y-6 animate-in">
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">ภาพรวมการเงิน</h3>
                                    
                                    {/* เพิ่มกล่องสรุปรายรับ */}
                                    <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl flex justify-between items-center premium-shadow">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center">
                                                <Icon name="arrow-up-right" size={20} />
                                            </div>
                                            <span className="font-bold text-sm text-emerald-800">รายรับรวมทั้งหมด</span>
                                        </div>
                                        <span className="font-black text-xl text-emerald-600">฿{totals.periodIncome.toLocaleString()}</span>
                                    </div>

                                    {/* กล่องสรุปรายจ่ายและงบประมาณ */}
                                    <div className="bg-white p-6 rounded-3xl premium-shadow border border-slate-100 relative mt-4">
                                        <button onClick={() => { setBudgetForm(categoryBudgets); setModals({...modals, budget: true}); }} className="absolute top-4 right-4 w-8 h-8 bg-slate-50 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full flex items-center justify-center transition-colors">
                                            <Icon name="edit-2" size={14} />
                                        </button>
                                        <p className="text-xs text-slate-400 font-medium text-center mb-1">รายจ่ายทั้งหมด {totalBudget > 0 ? '/ งบประมาณรวม' : ''}</p>
                                        
                                        <div className="flex items-end justify-center gap-2 mb-4">
                                            <h2 className="text-3xl font-black text-slate-800">฿{totals.periodExpense.toLocaleString()}</h2>
                                            {totalBudget > 0 && <span className="text-lg font-bold text-slate-400 mb-1">/ {totalBudget.toLocaleString()}</span>}
                                        </div>

                                        {totalBudget > 0 && (
                                            <div className="mb-6">
                                                <div className="flex justify-between text-[10px] font-bold mb-2">
                                                    <span className="text-slate-500">ใช้ไปแล้ว {(Math.min((totals.periodExpense / totalBudget) * 100, 100)).toFixed(1)}%</span>
                                                    <span className={totalBudget - totals.periodExpense < 0 ? "text-rose-500" : "text-emerald-500"}>
                                                        {totalBudget - totals.periodExpense < 0 ? `เกินงบ ฿${Math.abs(totalBudget - totals.periodExpense).toLocaleString()}` : `เหลือ ฿${(totalBudget - totals.periodExpense).toLocaleString()}`}
                                                    </span>
                                                </div>
                                                <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full transition-all duration-1000 ${
                                                        (totals.periodExpense / totalBudget) > 0.9 ? 'bg-rose-500' : 
                                                        (totals.periodExpense / totalBudget) > 0.7 ? 'bg-amber-500' : 'bg-emerald-500'
                                                    }`} style={{width: `${Math.min((totals.periodExpense / totalBudget) * 100, 100)}%`}}></div>
                                                </div>
                                            </div>
                                        )}
                                        
                                        <div className="space-y-4 mt-6">
                                            <p className="text-xs font-bold text-slate-500 mb-2">แยกตามหมวดหมู่รายจ่าย</p>
                                            {statsData.map(stat => (
                                                <div key={stat.id} className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-8 h-8 rounded-full text-white flex items-center justify-center ${stat.color}`}>
                                                                <Icon name={stat.icon} size={14}/>
                                                            </div>
                                                            <span className="text-sm font-bold text-slate-700">{stat.name}</span>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-sm font-black text-slate-800">฿{stat.amount.toLocaleString()}</span>
                                                            {stat.budget > 0 && <span className="text-xs font-bold text-slate-400 ml-1">/ {stat.budget.toLocaleString()}</span>}
                                                        </div>
                                                    </div>
                                                    
                                                    {stat.budget > 0 ? (
                                                        <div>
                                                            <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                                                                <div className={`h-full rounded-full transition-all duration-1000 ${
                                                                    stat.percent > 90 ? 'bg-rose-500' : stat.percent > 70 ? 'bg-amber-500' : stat.color
                                                                }`} style={{width: `${Math.min(stat.percent, 100)}%`}}></div>
                                                            </div>
                                                            <div className="flex justify-between mt-1">
                                                                <span className="text-[9px] font-bold text-slate-400">{stat.percent.toFixed(1)}%</span>
                                                                <span className={`text-[9px] font-bold ${stat.amount > stat.budget ? 'text-rose-500' : 'text-emerald-500'}`}>
                                                                    {stat.amount > stat.budget ? `เกินงบ ฿${(stat.amount - stat.budget).toLocaleString()}` : `เหลือ ฿${(stat.budget - stat.amount).toLocaleString()}`}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                                                            <div className={`h-full ${stat.color} rounded-full transition-all duration-1000`} style={{width: `${stat.percent}%`}}></div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            {statsData.length === 0 && (
                                                <p className="text-center text-sm text-slate-400 py-4">ไม่มีข้อมูลรายจ่าย</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* TAB: INVEST */}
                            {activeTab === 'invest' && (
                                <div className="space-y-5 animate-in">
                                    <div className="flex justify-between items-center">
                                        <h3 className="font-bold text-slate-800 text-lg">พอร์ตการลงทุน</h3>
                                        <button onClick={()=>setModals({...modals, inv:true})} className="text-indigo-600 text-sm font-medium flex items-center gap-1">
                                            <Icon name="plus" size={16}/> เพิ่มพอร์ต
                                        </button>
                                    </div>
                                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl p-6 text-white premium-shadow">
                                        <p className="text-indigo-100 text-xs font-medium mb-1">มูลค่าพอร์ตรวม</p>
                                        <h4 className="text-3xl font-bold">฿{totals.invSum.toLocaleString()}</h4>
                                    </div>
                                    <div className="space-y-3">
                                        {investments.map(inv => (
                                            <div key={inv.id} className="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center premium-shadow">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 bg-indigo-50 text-indigo-500 rounded-xl flex items-center justify-center">
                                                        <Icon name="pie-chart" size={20}/>
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-700 text-sm">{inv.name}</p>
                                                        <p className="text-[10px] text-slate-400">{inv.type}</p>
                                                    </div>
                                                </div>
                                                <p className="font-bold text-slate-800">฿{Number(inv.val).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Floating Navigation Bar */}
                        <div className="absolute bottom-6 left-6 right-6 z-20">
                            <div className="glass-nav rounded-[28px] px-6 py-4 flex justify-between items-center premium-shadow border border-white">
                                {[
                                    {id:'home', icon:'home'},
                                    {id:'stats', icon:'pie-chart'},
                                    {id:'history', icon:'clock'},
                                    {id:'invest', icon:'trending-up'}
                                ].map(t => (
                                    <button key={t.id} onClick={()=>setActiveTab(t.id)} 
                                            className={`relative flex flex-col items-center gap-1 p-2 transition-all duration-300 ${activeTab===t.id ? 'text-indigo-600 scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
                                        <Icon name={t.icon} size={22} />
                                        {activeTab===t.id && <span className="absolute -bottom-1 w-1 h-1 bg-indigo-600 rounded-full"></span>}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* ================= MODALS ================= */}
                        
                        {/* Transaction Modal */}
                        <div className={`absolute inset-0 z-[60] bg-slate-900/50 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.tx?'opacity-100':'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[32px] p-6 pb-12 slide-up flex flex-col max-h-[90vh] ${modals.tx?'active':''}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h4 className="font-bold text-xl text-slate-800">บันทึกรายการ</h4>
                                    <button onClick={()=>setModals({...modals,tx:false})} className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="x" size={18}/></button>
                                </div>
                                
                                <div className="flex bg-slate-100 p-1 rounded-xl mb-6">
                                    <button onClick={()=>{setTxType('expense'); setTxForm({...txForm, categoryId:'food'})}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${txType === 'expense' ? 'bg-white shadow text-rose-600' : 'text-slate-400'}`}>รายจ่าย</button>
                                    <button onClick={()=>{setTxType('income'); setTxForm({...txForm, categoryId:'salary'})}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${txType === 'income' ? 'bg-white shadow text-emerald-600' : 'text-slate-400'}`}>รายรับ</button>
                                </div>

                                <div className="overflow-y-auto no-scrollbar pb-4">
                                    <div className="mb-6">
                                        <input type="number" placeholder="0.00" 
                                               className={`w-full text-4xl font-black text-center outline-none bg-transparent ${txType==='expense'?'text-rose-500':'text-emerald-500'}`} 
                                               value={txForm.amount} onChange={e=>setTxForm({...txForm,amount:e.target.value})}/>
                                    </div>

                                    <p className="text-xs font-bold text-slate-400 mb-3">หมวดหมู่</p>
                                    <div className="grid grid-cols-4 gap-3 mb-6">
                                        {CATEGORIES[txType].map(cat => (
                                            <button key={cat.id} onClick={()=>setTxForm({...txForm, categoryId: cat.id})}
                                                    className={`flex flex-col items-center gap-2 p-2 rounded-2xl transition-all ${txForm.categoryId === cat.id ? 'bg-slate-50 ring-2 ring-indigo-500 scale-105' : 'opacity-70 grayscale'}`}>
                                                <div className={`w-10 h-10 rounded-full text-white flex items-center justify-center ${cat.color}`}>
                                                    <Icon name={cat.icon} size={18}/>
                                                </div>
                                                <span className="text-[10px] font-semibold text-slate-600">{cat.name}</span>
                                            </button>
                                        ))}
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <p className="text-xs font-bold text-slate-400 mb-2">บัญชี / กระเป๋าเงิน</p>
                                            <select className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-medium border border-slate-200 outline-none" 
                                                    value={txForm.sourceId} onChange={e=>setTxForm({...txForm,sourceId:e.target.value})}>
                                                {allSources.map(s => <option key={s.id} value={s.id}>{s.bankName} - {s.name||'หลัก'}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-slate-400 mb-2">บันทึกเพิ่มเติม (เลือกได้)</p>
                                            <input type="text" placeholder="ระบุรายการ..." 
                                                   className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-medium border border-slate-200 outline-none" 
                                                   value={txForm.title} onChange={e=>setTxForm({...txForm,title:e.target.value})}/>
                                        </div>
                                    </div>

                                    <button onClick={saveTx} className={`w-full mt-8 py-4 rounded-2xl text-white font-bold text-lg shadow-lg ${txType==='expense'?'bg-rose-500':'bg-emerald-500'}`}>
                                        บันทึกรายการ
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Account Modal */}
                        <div className={`absolute inset-0 z-[60] bg-slate-900/50 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.acc?'opacity-100':'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[32px] p-6 pb-12 slide-up ${modals.acc?'active':''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-bold text-xl">เพิ่มธนาคาร/บัญชี</h4><button onClick={()=>setModals({...modals,acc:false})} className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="x" size={18}/></button></div>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-medium border border-slate-200 outline-none" value={accForm.bankId} onChange={e=>setAccForm({...accForm,bankId:e.target.value})}>{THAI_BANKS.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setAccForm({...accForm, type:'ออมทรัพย์'})} className={`flex-1 py-3 text-xs font-bold rounded-xl border ${accForm.type==='ออมทรัพย์'?'bg-indigo-600 text-white':'bg-white text-slate-400'}`}>ออมทรัพย์</button>
                                        {THAI_BANKS.find(b=>b.id===accForm.bankId)?.hasTravel && <button onClick={()=>setAccForm({...accForm, type:'Travel Card'})} className={`flex-1 py-3 text-xs font-bold rounded-xl border ${accForm.type==='Travel Card'?'bg-indigo-600 text-white':'bg-white text-slate-400'}`}>Travel Card</button>}
                                    </div>
                                    <input type="text" placeholder="ชื่อบัญชี" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-medium border border-slate-200 outline-none" value={accForm.name} onChange={e=>setAccForm({...accForm,name:e.target.value})}/>
                                    <input type="number" placeholder="ยอดเงินเริ่มต้น" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-medium border border-slate-200 outline-none" value={accForm.balance} onChange={e=>setAccForm({...accForm,balance:e.target.value})}/>
                                    <button onClick={addAcc} className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">บันทึกข้อมูล</button>
                                </div>
                            </div>
                        </div>

                        {/* Invest Modal */}
                        <div className={`absolute inset-0 z-[60] bg-slate-900/50 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.inv?'opacity-100':'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[32px] p-6 pb-12 slide-up ${modals.inv?'active':''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-bold text-xl">สร้างพอร์ตลงทุน</h4><button onClick={()=>setModals({...modals,inv:false})} className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="x" size={18}/></button></div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="ชื่อพอร์ต" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none" value={invForm.name} onChange={e=>setInvForm({...invForm,name:e.target.value})}/>
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none" value={invForm.type} onChange={e=>setInvForm({...invForm,type:e.target.value})}><option>หุ้น</option><option>คริปโต</option><option>ทองคำ</option><option>อื่นๆ</option></select>
                                    <input type="number" placeholder="มูลค่า" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none" value={invForm.val} onChange={e=>setInvForm({...invForm,val:e.target.value})}/>
                                    <button onClick={()=>{if(!invForm.name || !invForm.val) return alert('กรุณากรอกข้อมูลให้ครบถ้วน'); setInvestments([{id:Date.now(),...invForm},...investments]);setModals({...modals,inv:false});setInvForm({name:'',type:'หุ้น',val:''})}} className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">บันทึกพอร์ต</button>
                                </div>
                            </div>
                        </div>

                        {/* Budget Modal */}
                        <div className={`absolute inset-0 z-[60] bg-slate-900/50 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.budget?'opacity-100':'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[32px] p-6 pb-12 slide-up flex flex-col max-h-[85vh] ${modals.budget?'active':''}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h4 className="font-bold text-xl text-slate-800">ตั้งงบประมาณ</h4>
                                        <p className="text-xs font-medium text-slate-400 mt-1">แยกตามหมวดหมู่รายจ่าย</p>
                                    </div>
                                    <button onClick={()=>setModals({...modals,budget:false})} className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="x" size={18}/></button>
                                </div>
                                
                                <div className="overflow-y-auto no-scrollbar space-y-3 pb-4">
                                    {CATEGORIES.expense.map(cat => (
                                        <div key={cat.id} className="flex items-center justify-between gap-3 bg-slate-50 p-3 rounded-2xl">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full text-white flex items-center justify-center ${cat.color}`}>
                                                    <Icon name={cat.icon} size={18}/>
                                                </div>
                                                <span className="text-sm font-bold text-slate-700">{cat.name}</span>
                                            </div>
                                            <input type="number" placeholder="ไม่ระบุ" 
                                                   className="w-1/2 p-3 bg-white rounded-xl text-sm font-bold border border-slate-200 outline-none text-right focus:border-indigo-500" 
                                                   value={budgetForm[cat.id] || ''} 
                                                   onChange={e=>setBudgetForm({...budgetForm, [cat.id]: e.target.value ? Number(e.target.value) : ''})}/>
                                        </div>
                                    ))}
                                </div>
                                
                                <button onClick={() => { 
                                    const cleanedBudget = Object.fromEntries(Object.entries(budgetForm).filter(([_, v]) => v > 0));
                                    setCategoryBudgets(cleanedBudget); 
                                    setModals({...modals, budget: false}); 
                                }} className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shrink-0">
                                    บันทึกงบประมาณ
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
