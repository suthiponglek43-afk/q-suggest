<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finance | Analysis Edition</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up.active { transform: translateY(0); }
        .investment-card { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Lucide = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name.toLowerCase()} className={className} style={{width: size, height: size, display:'inline-block'}}></i>;
        };

        const THAI_BANKS = [
            { id: 'kbank', name: 'กสิกรไทย', shortName: 'KBank', color: 'bg-emerald-600' },
            { id: 'scb', name: 'ไทยพาณิชย์', shortName: 'SCB', color: 'bg-purple-700' },
            { id: 'bbl', name: 'กรุงเทพ', shortName: 'BBL', color: 'bg-blue-800' },
            { id: 'ktb', name: 'กรุงไทย', shortName: 'KTB', color: 'bg-sky-500' },
            { id: 'bay', name: 'กรุงศรีฯ', shortName: 'BAY', color: 'bg-yellow-500' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [showBalance, setShowBalance] = useState(true);
            const [modals, setModals] = useState({ tx: false, acc: false, inv: false, bg: false });
            const [txType, setTxType] = useState('expense');
            const [period, setPeriod] = useState('เดือน'); // สัปดาห์, เดือน, ปี

            // --- Database ---
            const [cash, setCash] = useState(() => Number(localStorage.getItem('f_cash')) || 0);
            const [banks, setBanks] = useState(() => JSON.parse(localStorage.getItem('f_banks')) || []);
            const [invests, setInvests] = useState(() => JSON.parse(localStorage.getItem('f_inv')) || []);
            const [budgets, setBudgets] = useState(() => JSON.parse(localStorage.getItem('f_bg')) || []);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('f_tx')) || []);

            // --- Form States ---
            const [txForm, setTxForm] = useState({ amount: '', title: '', sourceId: 'cash', category: 'อาหาร' });
            const [accForm, setAccForm] = useState({ bankId: 'kbank', name: '', balance: '' });
            const [invForm, setInvForm] = useState({ name: '', value: '' });
            const [bgForm, setBgForm] = useState({ category: 'อาหาร', limit: '' });

            useEffect(() => {
                localStorage.setItem('f_cash', cash);
                localStorage.setItem('f_banks', JSON.stringify(banks));
                localStorage.setItem('f_inv', JSON.stringify(invests));
                localStorage.setItem('f_bg', JSON.stringify(budgets));
                localStorage.setItem('f_tx', JSON.stringify(transactions));
                lucide.createIcons();
            }, [cash, banks, invests, budgets, transactions, activeTab, modals, period]);

            const totals = useMemo(() => {
                const bankSum = banks.reduce((a, b) => a + b.accounts.reduce((ac, s) => ac + s.balance, 0), 0);
                const invSum = invests.reduce((a, i) => a + Number(i.value), 0);
                const periodExpense = transactions
                    .filter(t => t.type === 'expense')
                    .reduce((a, t) => a + Math.abs(t.amount), 0);
                return { netWorth: bankSum + cash + invSum, invSum, periodExpense };
            }, [banks, cash, invests, transactions]);

            const allSources = [{ id: 'cash', name: 'เงินสด', bankName: 'Cash' }, ...banks.flatMap(b => b.accounts.map(a => ({ ...a, bankName: b.shortName })))];

            const toggleM = (m, val) => setModals(prev => ({ ...prev, [m]: val }));

            const saveTx = () => {
                const amt = parseFloat(txForm.amount);
                if (!amt) return alert("ระบุจำนวนเงิน");
                
                let accLabel = "";
                if (txForm.sourceId === 'cash') {
                    setCash(prev => txType === 'expense' ? prev - amt : prev + amt);
                    accLabel = "เงินสด";
                } else {
                    const newBanks = banks.map(b => ({
                        ...b, accounts: b.accounts.map(a => {
                            if (a.id === parseInt(txForm.sourceId)) {
                                accLabel = `${b.shortName} - ${a.name}`;
                                return { ...a, balance: txType === 'expense' ? a.balance - amt : a.balance + amt };
                            }
                            return a;
                        })
                    }));
                    setBanks(newBanks);
                }

                if (txType === 'expense') {
                    setBudgets(budgets.map(b => b.category === txForm.category ? { ...b, spent: b.spent + amt } : b));
                }

                setTransactions([{ id: Date.now(), title: txForm.title || (txType==='expense'?'จ่าย':'รับ'), amount: txType==='expense'?-amt:amt, accLabel, date: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}), type: txType, category: txForm.category }, ...transactions]);
                toggleM('tx', false);
                setTxForm({ amount: '', title: '', sourceId: 'cash', category: 'อาหาร' });
            };

            const addAcc = () => {
                const bankBase = THAI_BANKS.find(b => b.id === accForm.bankId);
                const newAcc = { id: Date.now(), name: accForm.name, balance: parseFloat(accForm.balance || 0) };
                const idx = banks.findIndex(b => b.id === accForm.bankId);
                if (idx >= 0) {
                    const updated = [...banks]; updated[idx].accounts.push(newAcc); setBanks(updated);
                } else {
                    setBanks([...banks, { ...bankBase, accounts: [newAcc] }]);
                }
                toggleM('acc', false);
            };

            return (
                <div className="min-h-screen flex justify-center">
                    <div className="w-full max-w-md bg-white sm:rounded-[40px] shadow-2xl relative flex flex-col h-screen overflow-hidden">
                        
                        {/* Header */}
                        <div className="pt-12 pb-8 px-6 bg-white shrink-0 rounded-b-[40px] shadow-sm z-10 text-center">
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Net Worth รวม</p>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter mt-2">
                                {showBalance ? `฿${totals.netWorth.toLocaleString()}` : '••••••••••'}
                            </h2>
                            <div className="flex justify-center gap-3 mt-8">
                                <button onClick={() => {setTxType('expense'); toggleM('tx', true);}} className="flex-1 bg-black text-white py-4 rounded-2xl text-xs font-bold shadow-lg active:scale-95 transition-all">บันทึกรายการ</button>
                                <button onClick={() => setShowBalance(!showBalance)} className="px-6 border border-slate-200 py-4 rounded-2xl text-slate-400 active:scale-95 transition-all">
                                    <Lucide name={showBalance ? "Eye" : "EyeOff"} size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="flex-1 px-6 pt-6 pb-28 overflow-y-auto no-scrollbar space-y-8 bg-slate-50/30">
                            
                            {activeTab === 'home' && (
                                <div className="space-y-8 animate-in">
                                    {/* การลงทุน Card */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><h3 className="font-bold text-slate-800">การลงทุน</h3><button onClick={()=>toggleM('inv', true)} className="text-blue-600 text-xs font-bold">จัดการพอร์ต ↗</button></div>
                                        <div className="investment-card rounded-[32px] p-6 text-white shadow-xl relative overflow-hidden">
                                            <p className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">พอร์ตลงทุนรวม</p>
                                            <div className="flex items-center justify-between mt-1">
                                                <h4 className="text-3xl font-black">฿{totals.invSum.toLocaleString()}</h4>
                                                <span className="bg-emerald-400 text-emerald-900 text-[10px] font-bold px-2 py-1 rounded-full">+5.4%</span>
                                            </div>
                                            <div className="flex gap-3 mt-6">
                                                {invests.length > 0 ? invests.slice(0,2).map((i,idx) => (
                                                    <div key={idx} className="flex-1 bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/10 text-center">
                                                        <p className="text-[9px] opacity-60 truncate">{i.name}</p>
                                                        <p className="font-bold text-sm">฿{Number(i.value).toLocaleString()}</p>
                                                    </div>
                                                )) : <p className="text-[10px] opacity-50">ยังไม่มีข้อมูลการลงทุน</p>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* รายการบัญชี */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><h3 className="font-bold text-slate-800">บัญชีและเงินสด</h3><button onClick={()=>toggleM('acc', true)} className="text-blue-600 text-xs font-bold">+ เพิ่มบัญชี</button></div>
                                        <div className="bg-white p-4 rounded-[28px] border border-slate-100 shadow-sm flex justify-between items-center"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center"><Lucide name="Banknote" size={20}/></div><div><p className="font-bold text-sm">เงินสด</p><p className="text-[10px] text-slate-400">Cash</p></div></div><p className="font-bold text-slate-800">฿{cash.toLocaleString()}</p></div>
                                        {banks.map(b => (
                                            <div key={b.id} className="bg-white p-4 rounded-[28px] border border-slate-100 shadow-sm flex justify-between items-center">
                                                <div className="flex items-center gap-3"><div className={`w-10 h-10 ${b.color} rounded-xl text-white text-[10px] font-bold flex items-center justify-center`}>{b.shortName}</div><div><p className="font-bold text-sm">{b.name}</p><p className="text-[10px] text-slate-400">{b.accounts.length} บัญชี</p></div></div>
                                                <p className="font-bold text-slate-800">฿{b.accounts.reduce((a,ac)=>a+ac.balance,0).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'stats' && (
                                <div className="space-y-8 animate-in pb-10">
                                    <h3 className="font-bold text-xl text-slate-800">วิเคราะห์รายจ่าย</h3>
                                    
                                    {/* Period Selector (สัปดาห์ / เดือน / ปี) */}
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['สัปดาห์', 'เดือน', 'ปี'].map(p => (
                                            <button key={p} onClick={()=>setPeriod(p)} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${period === p ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>
                                                {p}
                                            </button>
                                        ))}
                                    </div>

                                    {/* Donut Chart Section */}
                                    <div className="bg-white p-8 rounded-[40px] shadow-sm flex flex-col items-center relative">
                                        <div className="relative w-48 h-48 flex items-center justify-center">
                                            <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#F1F5F9" strokeWidth="3"></circle>
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#3B82F6" strokeWidth="3" strokeDasharray="40, 100"></circle>
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#F43F5E" strokeWidth="3" strokeDasharray="25, 100" strokeDashoffset="-40"></circle>
                                            </svg>
                                            <div className="absolute flex flex-col items-center">
                                                <p className="text-[10px] text-slate-400">{period}นี้</p>
                                                <p className="text-2xl font-black">฿{totals.periodExpense.toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <div className="w-full mt-8 grid grid-cols-2 gap-4">
                                            <div className="flex items-center gap-2 text-xs font-bold"><div className="w-3 h-3 rounded-full bg-blue-500"></div> อาหาร 40%</div>
                                            <div className="flex items-center gap-2 text-xs font-bold text-right justify-end"><div className="w-3 h-3 rounded-full bg-rose-500"></div> ช้อปปิ้ง 25%</div>
                                        </div>

                                        {/* Bar Comparison Section (เปรียบเทียบ) */}
                                        <div className="w-full mt-10 pt-8 border-t border-slate-50">
                                            <div className="flex justify-between items-center mb-6">
                                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">เปรียบเทียบ</h4>
                                                <div className="flex items-center gap-1 text-emerald-500 font-bold text-[10px] bg-emerald-50 px-2 py-1 rounded-lg">
                                                    <Lucide name="TrendingDown" size={12}/> +12.4%
                                                </div>
                                            </div>
                                            <div className="flex items-end justify-around h-24 gap-4">
                                                <div className="flex-1 flex flex-col items-center gap-2">
                                                    <div className="w-full bg-slate-100 rounded-t-xl" style={{height: '70%'}}></div>
                                                    <p className="text-[9px] font-bold text-slate-400">{period === 'เดือน' ? 'เดือนที่แล้ว' : period === 'สัปดาห์' ? 'สัปดาห์ก่อน' : 'ปีที่แล้ว'}</p>
                                                    <p className="text-[10px] font-black">฿28.8k</p>
                                                </div>
                                                <div className="flex-1 flex flex-col items-center gap-2">
                                                    <div className="w-full bg-blue-500 rounded-t-xl" style={{height: '90%'}}></div>
                                                    <p className="text-[9px] font-bold text-slate-900">{period}นี้</p>
                                                    <p className="text-[10px] font-black">฿{Math.round(totals.periodExpense/1000 * 10)/10}k</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* งบประมาณ Section */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><h3 className="font-bold text-slate-800">งบประมาณ</h3><button onClick={()=>toggleM('bg', true)} className="text-blue-600 text-xs font-bold">+ ตั้งงบ</button></div>
                                        <div className="bg-white p-6 rounded-[32px] border border-slate-50 space-y-6">
                                            {budgets.map((bg, idx) => {
                                                const pct = Math.min(Math.round((bg.spent/bg.limit)*100), 100);
                                                return (
                                                    <div key={idx} className="space-y-2">
                                                        <div className="flex justify-between items-end"><p className="text-sm font-bold text-slate-700">{bg.category}</p><p className="text-xs font-bold">{pct}% <span className="text-slate-300 font-normal">/ ฿{bg.limit.toLocaleString()}</span></p></div>
                                                        <div className="h-2 bg-slate-50 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full transition-all duration-700" style={{width: `${pct}%`}}></div></div>
                                                    </div>
                                                )
                                            })}
                                            {budgets.length === 0 && <p className="text-center py-4 text-xs text-slate-300 italic">ยังไม่ได้ตั้งงบประมาณ</p>}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-in">
                                    <h3 className="font-bold text-xl text-slate-800 mb-4">ประวัติรายการ</h3>
                                    {transactions.map(t => (
                                        <div key={t.id} className="bg-white p-4 rounded-[28px] border border-slate-50 shadow-sm flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl ${t.amount > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}><Lucide name={t.amount > 0 ? "ArrowDownLeft" : "ArrowUpRight"} size={20}/></div>
                                                <div><p className="font-bold text-sm text-slate-800">{t.title}</p><p className="text-[10px] text-slate-400">{t.accLabel} • {t.category}</p></div>
                                            </div>
                                            <div className="text-right"><p className={`font-bold text-sm ${t.amount > 0 ? 'text-emerald-600' : 'text-slate-800'}`}>{t.amount > 0 ? '+' : ''}฿{Math.abs(t.amount).toLocaleString()}</p><p className="text-[9px] text-slate-300">{t.date}</p></div>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && <div className="text-center py-20 italic text-slate-300">ไม่มีประวัติ</div>}
                                </div>
                            )}
                        </div>

                        {/* Bottom Navigation */}
                        <div className="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-10 py-5 flex justify-between items-center pb-8 z-20">
                            {[{id:'home', icon:'Wallet', label:'Wallet'}, {id:'history', icon:'History', label:'History'}, {id:'stats', icon:'PieChart', label:'Stats'}].map(t => (
                                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'text-indigo-600 -translate-y-1' : 'text-slate-300'}`}>
                                    <Lucide name={t.icon} size={24} />
                                    <span className="text-[9px] font-black uppercase tracking-wider">{t.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* Modals (Tx, Acc, Inv, Bg) - โค้ดส่วน Modals ยังคงเดิมเหมือนเวอร์ชันก่อนหน้า */}
                        {/* Transaction Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.tx ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.tx ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">บันทึกรายการ</h4><button onClick={()=>toggleM('tx', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-8"><button onClick={()=>setTxType('expense')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${txType==='expense'?'bg-white shadow-sm text-rose-600':'text-slate-400'}`}>รายจ่าย</button><button onClick={()=>setTxType('income')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${txType==='income'?'bg-white shadow-sm text-emerald-600':'text-slate-400'}`}>รายรับ</button></div>
                                <div className="space-y-6">
                                    <input type="number" placeholder="0.00" className={`w-full text-5xl font-black text-center outline-none ${txType==='expense'?'text-rose-500':'text-emerald-500'}`} value={txForm.amount} onChange={e=>setTxForm({...txForm, amount: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={txForm.sourceId} onChange={e=>setTxForm({...txForm, sourceId: e.target.value})}>{allSources.map(s => <option key={s.id} value={s.id}>{s.bankName} - {s.name || 'รวม'}</option>)}</select>
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={txForm.category} onChange={e=>setTxForm({...txForm, category: e.target.value})}>{['อาหาร', 'เดินทาง', 'ช้อปปิ้ง', 'ทั่วไป'].map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <input type="text" placeholder="บันทึก..." className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={txForm.title} onChange={e=>setTxForm({...txForm, title: e.target.value})} />
                                    <button onClick={saveTx} className={`w-full py-5 rounded-[32px] text-white font-black text-lg ${txType==='expense'?'bg-rose-500 shadow-rose-100':'bg-emerald-500 shadow-emerald-100'} shadow-xl`}>ยืนยัน</button>
                                </div>
                            </div>
                        </div>

                        {/* Account Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.acc ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.acc ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">เพิ่มธนาคาร</h4><button onClick={()=>toggleM('acc', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={accForm.bankId} onChange={e=>setAccForm({...accForm, bankId: e.target.value})}>{THAI_BANKS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</select>
                                    <input type="text" placeholder="ชื่อบัญชี" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={accForm.name} onChange={e=>setAccForm({...accForm, name: e.target.value})} />
                                    <input type="number" placeholder="เงินเริ่มต้น" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={accForm.balance} onChange={e=>setAccForm({...accForm, balance: e.target.value})} />
                                    <button onClick={addAcc} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-lg">บันทึก</button>
                                </div>
                            </div>
                        </div>

                        {/* Investment Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.inv ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.inv ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">พอร์ตลงทุน</h4><button onClick={()=>toggleM('inv', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="ชื่อสินทรัพย์" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={invForm.name} onChange={e=>setInvForm({...invForm, name: e.target.value})} />
                                    <input type="number" placeholder="มูลค่าปัจจุบัน" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={invForm.value} onChange={e=>setInvForm({...invForm, value: e.target.value})} />
                                    <button onClick={()=>{setInvests([...invests, {...invForm}]); toggleM('inv', false);}} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg">บันทึก</button>
                                </div>
                            </div>
                        </div>

                        {/* Budget Modal */}
                        <div className={`absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-end transition-opacity duration-300 ${modals.bg ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className={`w-full bg-white rounded-t-[40px] p-8 pb-12 slide-up ${modals.bg ? 'active' : ''}`}>
                                <div className="flex justify-between items-center mb-6"><h4 className="font-black text-xl">ตั้งงบประมาณ</h4><button onClick={()=>toggleM('bg', false)}><Lucide name="X" size={24}/></button></div>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={bgForm.category} onChange={e=>setBgForm({...bgForm, category: e.target.value})}>{['อาหาร', 'เดินทาง', 'ช้อปปิ้ง', 'ทั่วไป'].map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <input type="number" placeholder="วงเงิน" className="w-full p-4 bg-slate-50 rounded-2xl font-bold" value={bgForm.limit} onChange={e=>setBgForm({...bgForm, limit: e.target.value})} />
                                    <button onClick={()=>{setBudgets([...budgets, {category: bgForm.category, limit: Number(bgForm.limit), spent: 0}]); toggleM('bg', false);}} className="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg">บันทึก</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
