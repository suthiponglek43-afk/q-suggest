<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Note | สมุดบันทึกส่วนตัว</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .slide-up { transform: translateY(100%); transition: transform 0.3s ease-in-out; }
        .slide-up.active { transform: translateY(0); }
    </style>
</head>
<body class="antialiased text-gray-800 h-screen w-full flex justify-center bg-gray-200 sm:p-4 md:p-8">

    <div class="w-full max-w-md bg-white sm:rounded-[2rem] sm:shadow-2xl overflow-hidden flex flex-col h-full relative border border-gray-100">
        
        <div class="bg-indigo-600 text-white p-5 shadow-md z-10 sticky top-0">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-book-bookmark"></i> My Note
                </h1>
                <span class="text-xs bg-indigo-500 px-2 py-1 rounded-full"><i class="fa-solid fa-wifi-slash"></i> Offline</span>
            </div>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-indigo-300"></i>
                <input type="text" id="searchInput" onkeyup="searchNotes()" placeholder="ค้นหาบันทึก..." 
                    class="w-full bg-indigo-700 text-white placeholder-indigo-300 border-none rounded-xl py-2 pl-10 pr-4 focus:ring-2 focus:ring-white outline-none">
            </div>
        </div>

        <div id="notesContainer" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 pb-24">
            <div id="emptyState" class="text-center text-gray-400 mt-20 hidden">
                <i class="fa-solid fa-folder-open text-5xl mb-4 text-gray-300"></i>
                <p class="text-lg">ยังไม่มีบันทึกข้อมูล</p>
                <p class="text-sm">กดปุ่ม + ด้านล่างเพื่อเริ่มบันทึก</p>
            </div>
            <div id="notesList" class="space-y-3"></div>
        </div>

        <button onclick="openForm()" class="absolute bottom-6 right-6 bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-lg shadow-indigo-300 flex justify-center items-center text-2xl transition-transform transform hover:scale-105 z-10">
            <i class="fa-solid fa-plus"></i>
        </button>

        <div id="noteForm" class="absolute inset-0 bg-white z-30 slide-up flex flex-col">
            <div class="bg-white p-4 flex justify-between items-center border-b shadow-sm">
                <h2 id="formTitle" class="text-xl font-semibold text-gray-800">เพิ่มบันทึกใหม่</h2>
                <button onclick="closeForm()" class="text-gray-500 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>
            
            <div class="p-5 flex-1 overflow-y-auto space-y-4">
                <input type="hidden" id="noteId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">หัวข้อ</label>
                    <input type="text" id="noteTitle" placeholder="หัวข้อบันทึก..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-medium">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่ (สี)</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer"><input type="radio" name="noteColor" value="blue" checked class="peer sr-only"><div class="w-8 h-8 rounded-full bg-blue-500 peer-checked:ring-4 peer-checked:ring-blue-200"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="noteColor" value="green" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-green-500 peer-checked:ring-4 peer-checked:ring-green-200"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="noteColor" value="yellow" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-yellow-400 peer-checked:ring-4 peer-checked:ring-yellow-200"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="noteColor" value="red" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-red-500 peer-checked:ring-4 peer-checked:ring-red-200"></div></label>
                    </div>
                </div>
                <div class="flex-1 flex flex-col h-full">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียด</label>
                    <textarea id="noteContent" placeholder="พิมพ์เนื้อหาที่นี่..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none flex-1 min-h-[200px] resize-none"></textarea>
                </div>
            </div>

            <div class="p-4 border-t bg-white">
                <button onclick="saveNote()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl shadow-md flex justify-center items-center gap-2 text-lg">
                    <i class="fa-solid fa-check"></i> บันทึกข้อมูล
                </button>
            </div>
        </div>

        <div id="viewForm" class="absolute inset-0 bg-white z-20 slide-up flex flex-col">
            <div class="bg-white p-4 flex justify-between items-center border-b shadow-sm">
                <button onclick="closeView()" class="text-gray-500 hover:text-indigo-600 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> กลับ
                </button>
                <div class="flex gap-3">
                    <button onclick="openEditFromView()" class="text-blue-500 w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deleteFromView()" class="text-red-500 w-8 h-8 rounded-full bg-red-50 flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <div id="viewDate" class="text-xs text-gray-400 mb-2"></div>
                <h2 id="viewTitle" class="text-2xl font-bold text-gray-800 mb-4"></h2>
                <div id="viewColorBadge" class="w-10 h-1.5 rounded-full mb-6"></div>
                <p id="viewContent" class="text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
            </div>
            <input type="hidden" id="viewingId">
        </div>

    </div>

    <script>
        const colorMap = { 'blue': 'bg-blue-500', 'green': 'bg-green-500', 'yellow': 'bg-yellow-400', 'red': 'bg-red-500' };
        const colorBorderMap = { 'blue': 'border-blue-200', 'green': 'border-green-200', 'yellow': 'border-yellow-200', 'red': 'border-red-200' };

        function openForm(id = null) {
            document.getElementById('noteForm').classList.add('active');
            if (id) {
                document.getElementById('formTitle').innerText = "แก้ไขบันทึก";
                let notes = JSON.parse(localStorage.getItem('myAppNotes')) || [];
                let note = notes.find(n => n.id === id);
                document.getElementById('noteId').value = note.id;
                document.getElementById('noteTitle').value = note.title;
                document.getElementById('noteContent').value = note.content;
                document.querySelector(`input[name="noteColor"][value="${note.color}"]`).checked = true;
            } else {
                document.getElementById('formTitle').innerText = "เพิ่มบันทึกใหม่";
                document.getElementById('noteId').value = '';
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                document.querySelector(`input[name="noteColor"][value="blue"]`).checked = true;
            }
        }

        function closeForm() { document.getElementById('noteForm').classList.remove('active'); }

        function openView(id) {
            let notes = JSON.parse(localStorage.getItem('myAppNotes')) || [];
            let note = notes.find(n => n.id === id);
            
            document.getElementById('viewingId').value = note.id;
            document.getElementById('viewTitle').innerText = note.title;
            document.getElementById('viewContent').innerText = note.content;
            
            const d = new Date(note.date);
            document.getElementById('viewDate').innerText = `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}`;
            document.getElementById('viewColorBadge').className = `w-10 h-1.5 rounded-full mb-6 ${colorMap[note.color]}`;
            document.getElementById('viewForm').classList.add('active');
        }

        function closeView() { document.getElementById('viewForm').classList.remove('active'); }
        function openEditFromView() { closeView(); openForm(document.getElementById('viewingId').value); }
        function deleteFromView() { deleteNote(document.getElementById('viewingId').value); closeView(); }

        function saveNote() {
            const id = document.getElementById('noteId').value;
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            const color = document.querySelector('input[name="noteColor"]:checked').value;

            if (!title && !content) return alert("กรุณาพิมพ์ข้อมูลก่อนบันทึกครับ");

            let notes = JSON.parse(localStorage.getItem('myAppNotes')) || [];
            if (id) {
                let index = notes.findIndex(n => n.id === id);
                notes[index] = { ...notes[index], title: title || 'ไม่มีหัวข้อ', content, color, updateDate: new Date().toISOString() };
            } else {
                notes.unshift({ id: Date.now().toString(), title: title || 'ไม่มีหัวข้อ', content, color, date: new Date().toISOString() });
            }

            localStorage.setItem('myAppNotes', JSON.stringify(notes));
            closeForm();
            renderNotes();
        }

        function deleteNote(id) {
            if (confirm("ต้องการลบบันทึกนี้อย่างถาวรใช่หรือไม่?")) {
                let notes = JSON.parse(localStorage.getItem('myAppNotes')) || [];
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('myAppNotes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function renderNotes(searchTerm = "") {
            const notesList = document.getElementById('notesList');
            const emptyState = document.getElementById('emptyState');
            let notes = JSON.parse(localStorage.getItem('myAppNotes')) || [];

            if (searchTerm) {
                notes = notes.filter(n => n.title.toLowerCase().includes(searchTerm.toLowerCase()) || n.content.toLowerCase().includes(searchTerm.toLowerCase()));
            }

            notesList.innerHTML = '';
            if (notes.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                notes.forEach(note => {
                    const d = new Date(note.date);
                    const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
                    const shortContent = note.content.length > 50 ? note.content.substring(0, 50) + '...' : note.content;
                    
                    notesList.innerHTML += `
                        <div onclick="openView('${note.id}')" class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${colorBorderMap[note.color]} cursor-pointer hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-semibold text-gray-800 truncate pr-2">${note.title}</h3>
                                <span class="text-[10px] text-gray-400 whitespace-nowrap">${dateStr}</span>
                            </div>
                            <p class="text-sm text-gray-500 line-clamp-2">${shortContent}</p>
                        </div>
                    `;
                });
            }
        }

        function searchNotes() { renderNotes(document.getElementById('searchInput').value); }

        // เริ่มต้นใช้งาน Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered')).catch(err => console.log('SW error', err));
            });
        }

        window.onload = () => renderNotes();
    </script>
</body>
</html>
